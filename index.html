<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover and manage delicious recipes with our interactive recipe collection. Search, filter, and explore thousands of recipes from around the world.">
    <meta name="keywords" content="recipes, cooking, food, meal planning, kitchen, ingredients">
    <meta name="author" content="Ilkhom">
    <meta name="robots" content="index, follow">

    <title>CookIN - Recipe Management Platform</title>

    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Skip to main content link for accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- Navigation Header -->
    <header class="navbar" role="banner">
        <div class="navbar-container">
            <div class="logo">
                <h1 aria-label="COOKIN - Your Recipe Management Platform">Cook<span class="logo-accent">IN</span></h1>
            </div>
            <nav class="nav-menu" role="navigation" aria-label="Main navigation">
                <a href="index.html" class="nav-btn" aria-label="Navigate to Recipes section">Recipes</a>
                <a href="about.html" class="nav-btn" aria-label="Navigate to About section">About</a>
                <a href="contact.html" class="nav-btn" aria-label="Navigate to Contact section">Contact</a>
            </nav>
            <button class="menu-toggle" aria-label="Toggle navigation menu" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>



    <main id="main-content" role="main">
        <!-- Filter and Search Section -->
        <section class="filters-section" role="region" aria-labelledby="filter-title">
            <h2 id="filter-title" class="sr-only">Filter Recipes</h2>
            <div class="filters-container">
                <div class="search-box">
                    <label for="search-input" class="sr-only">Search recipes by name</label>
                    <input 
                        type="search" 
                        id="search-input" 
                        class="search-input" 
                        placeholder="Search recipes..." 
                        aria-describedby="search-help">
                    <span id="search-help" class="sr-only">Type recipe name to filter results</span>
                </div>
                <div class="filter-group">
                    <label for="cuisine-filter" class="filter-label">Cuisine:</label>
                    <select id="cuisine-filter" class="filter-select" aria-label="Filter by cuisine type">
                        <option value="">All Cuisines</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="difficulty-filter" class="filter-label">Difficulty:</label>
                    <select id="difficulty-filter" class="filter-select" aria-label="Filter by difficulty level">
                        <option value="">All Levels</option>
                        <option value="Easy">Easy</option>
                        <option value="Medium">Medium</option>
                        <option value="Hard">Hard</option>
                    </select>
                </div>
                <button id="reset-filters" class="btn-reset" aria-label="Reset all filters">Reset Filters</button>
            </div>
        </section>

        <!-- Loading State -->
        <div id="loading" class="loading" role="status" aria-live="polite" aria-label="Loading recipes">
            <div class="spinner"></div>
            <p>Loading recipes...</p>
        </div>

        <!-- Error Message -->
        <div id="error" class="error-message" role="alert" aria-live="assertive"></div>

        <!-- Recipes Grid -->
        <section class="recipes-section" role="region" aria-labelledby="recipes-title">
            <h2 id="recipes-title" class="sr-only">Available Recipes</h2>
            <div id="recipes-grid" class="recipes-grid" role="list"></div>
        </section>

        <!-- No Results Message -->
        <div id="no-results" class="no-results" role="status" aria-live="polite">
            <p>No recipes found. Try adjusting your filters.</p>
        </div>

        <!-- Recipe Detail Modal -->
        <div id="recipe-modal" class="modal" role="dialog" aria-labelledby="modal-title" aria-hidden="true">
            <div class="modal-content">
                <button class="modal-close" aria-label="Close recipe details">&times;</button>
                <div id="modal-body"></div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer" role="contentinfo">
        <div class="footer-content">
            <div class="footer-section">
                <h3>CookIN</h3>
                <p>Your source for delicious recipes from around the world.</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 CookIN. All rights reserved.</p>
        </div>
    </footer>

    <script src="assets/scripts/nav.js" defer></script>
    <script src="assets/scripts/api.js" defer></script>
</body>
</html>
